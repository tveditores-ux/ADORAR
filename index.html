<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ADORAR 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
height:100vh;
width:100%;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top right, rgba(216,179,106,.15), transparent 35%),
radial-gradient(circle at bottom left, rgba(216,179,106,.08), transparent 30%),
linear-gradient(180deg,#07101d 0%, #0b1f38 45%, #07101d 100%);
color:white;
padding:
env(safe-area-inset-top)
18px
env(safe-area-inset-bottom)
18px;
}

.glow1{
position:absolute;
width:280px;
height:280px;
background:#d8b36a20;
filter:blur(120px);
border-radius:50%;
top:-80px;
right:-80px;
z-index:-1;
}

.glow2{
position:absolute;
width:220px;
height:220px;
background:#ffffff10;
filter:blur(100px);
border-radius:50%;
bottom:-50px;
left:-50px;
z-index:-1;
}

.container{
width:100%;
max-width:430px;
height:100%;
max-height:900px;
padding:38px 24px;
display:flex;
flex-direction:column;
justify-content:space-between;
border-radius:32px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.12);
box-shadow:
0 0 40px rgba(0,0,0,.35),
inset 0 1px 0 rgba(255,255,255,.12);
}

.header{
text-align:center;
margin-top:10px;
}

h1{
font-family:'Cinzel',serif;
font-size:2.7rem;
color:#d8b36a;
letter-spacing:4px;
margin-bottom:12px;
text-shadow:0 0 20px rgba(216,179,106,.25);
}

.subtitle{
font-size:1.15rem;
color:#d8b36a;
font-style:italic;
font-weight:600;
letter-spacing:1px;
margin-bottom:10px;
}

.date{
font-size:1rem;
opacity:.85;
font-weight:300;
}

.middle{
text-align:center;
}

.count-label{
font-size:.95rem;
letter-spacing:3px;
text-transform:uppercase;
opacity:.75;
margin-bottom:24px;
}

.timer{
display:flex;
justify-content:space-between;
gap:12px;
}

.box{
flex:1;
padding:20px 10px;
border-radius:22px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.10);
backdrop-filter:blur(12px);
box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}

.number{
font-size:2.1rem;
font-weight:700;
}

.label{
font-size:.72rem;
margin-top:6px;
text-transform:uppercase;
letter-spacing:1px;
color:#d8b36a;
}

.player{
text-align:center;
padding-top:20px;
}

.player-title{
font-size:.95rem;
letter-spacing:3px;
color:#d8b36a;
margin-bottom:18px;
}

audio{
width:100%;
height:58px;
border-radius:20px;
filter: invert(1) hue-rotate(180deg);
}

.footer{
text-align:center;
font-size:.75rem;
opacity:.55;
letter-spacing:1px;
margin-top:12px;
}

@media(max-width:480px){

h1{
font-size:2.2rem;
}

.subtitle{
font-size:1rem;
}

.number{
font-size:1.7rem;
}

.container{
padding:28px 18px;
}
}
</style>
</head>
<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

<div class="header">
<h1>ADORAR 2026</h1>
<p class="subtitle">Seguros y confiados en Cristo</p>
<p class="date">8 al 14 de Junio</p>
</div>

<div class="middle">
<p class="count-label">Faltan</p>

<div class="timer">

<div class="box">
<div class="number" id="days">00</div>
<div class="label">Días</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Horas</div>
</div>

<div class="box">
<div class="number" id="mins">00</div>
<div class="label">Min</div>
</div>

<div class="box">
<div class="number" id="secs">00</div>
<div class="label">Seg</div>
</div>

</div>
</div>

<div class="player">
<p class="player-title">PLAYLIST OFICIAL</p>

<audio controls>
<source src="https://www.dropbox.com/scl/fi/i1hl3orf4a6jemmunbk0k/PlayList-ADORAR-2026.mp3?rlkey=jykmhogngor8m9yqkr9tl47jx&raw=1" type="audio/mpeg">
Tu navegador no soporta audio.
</audio>

<div class="footer">
ADORAR • 2026
</div>

</div>

</div>

<script>
const eventDate = new Date("June 8, 2026 00:00:00").getTime();

function updateCountdown(){
const now = new Date().getTime();
const diff = eventDate - now;

if(diff <= 0){
["days","hours","mins","secs"].forEach(id=>{
document.getElementById(id).innerText="00";
});
return;
}

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const mins=Math.floor((diff%(1000*60*60))/(1000*60));
const secs=Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=String(days).padStart(2,'0');
document.getElementById("hours").innerText=String(hours).padStart(2,'0');
document.getElementById("mins").innerText=String(mins).padStart(2,'0');
document.getElementById("secs").innerText=String(secs).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
